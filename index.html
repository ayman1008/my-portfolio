<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayman Zia | Flutter Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- Color Palette & Base Setup --- */
        :root {
            --bg-dark: #121521;
            --text-light: #e2e8f0;
            --text-muted: #94a3b8;
            --gradient-primary: linear-gradient(90deg, #d946ef, #8b5cf6); /* Pink to Purple */
            --gradient-button: linear-gradient(90deg, #6366f1, #a855f7); /* Blue to Purple */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Navigation Bar --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #60a5fa; /* Light blue logo text */
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links li a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 400;
            transition: 0.3s;
        }

        .nav-links li a.active, .nav-links li a:hover {
            color: #d946ef;
            border-bottom: 2px solid #d946ef;
            padding-bottom: 5px;
        }

        /* --- Hero Section --- */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px 8%;
            min-height: 80vh;
            gap: 50px;
        }

        .hero-content {
            flex: 1;
            max-width: 600px;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        /* The glowing gradient text effect */
        .gradient-text {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* --- Buttons --- */
        .button-group {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-primary {
            background: var(--gradient-button);
        }

        .btn-secondary {
            background: #3b82f6; /* Solid Blue */
        }

        /* --- Social Icons --- */
        .social-icons {
            display: flex;
            gap: 15px;
        }

        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            color: #8b5cf6;
            border-radius: 50%;
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .social-icons a:hover {
            background: var(--gradient-primary);
            color: #fff;
            transform: translateY(-3px);
        }

        /* --- Hero Image & Blob Shape --- */
        .hero-image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .blob-image {
            width: 400px;
            height: 400px;
            background-color: #2a2d3e; /* Fallback color before image loads */
            background-image: url('assets/profile.jpg'); /* Replace with your image */
            background-size: cover;
            background-position: center;
            /* This creates the organic blob shape */
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph 8s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(217, 70, 239, 0.2);
        }

        /* Animates the blob to move slightly */
        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        /* Responsive Design for Mobile */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 40px 5%;
            }
            .button-group, .social-icons {
                justify-content: center;
            }
            .nav-links {
                display: none; /* Can add a hamburger menu later */
            }
            .blob-image {
                width: 300px;
                height: 300px;
            }
            .hero-content h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <nav>

            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        
        <div class="hero-content">
            <h1>Hi, I'm <br> <span class="gradient-text">Ayman Zia</span></h1>
            <p>I craft exceptional digital experiences with clean, efficient code and beautiful designs that make an impact. Specializing in Mobile Application Development.</p>
            
            <div class="button-group">
                <a href="mailto:aymanzia2005@gmail.com" class="btn btn-primary">
                    Hire Me <i class="fa-solid fa-paper-plane"></i>
                </a>
                <a href="#" class="btn btn-secondary">
                    Download CV <i class="fa-solid fa-download"></i>
                </a>
            </div>

            <div class="social-icons">
                <a href="https://github.com/ayman1008" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="https://www.linkedin.com/in/ayman-zia/" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </div>

        <div class="hero-image-container">
            <div class="blob-image"></div>
        </div>

    </section>

</body>
</html>
